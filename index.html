<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eden Car Audio - Garage 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; touch-action: none; }
canvas { display: block; width: 100vw; height: 100vh; }
#info {
  position: fixed; bottom: 16px; left: 16px; color: #fff;
  font-size: 13px; opacity: 0.7; z-index: 10; pointer-events: none;
}
#fps { position: fixed; top: 12px; right: 16px; color: #fff; font-size: 12px; opacity: 0.5; z-index: 10; }
#spinner {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #fff; font-size: 18px; z-index: 20; text-align: center;
}
#spinner .dot { display: inline-block; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
#spinner .dot:nth-child(2) { animation-delay: 0.2s; }
#spinner .dot:nth-child(3) { animation-delay: 0.4s; }
#progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: #4af; z-index: 30; transition: width 0.3s;
}
#message { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #f44; font-size: 16px; z-index: 40; }
#camid { display: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="fps"></div>
<div id="info">
  Mouse: look around &middot; Up/Down arrows: move forward/back &middot; Left/Right arrows: turn<br>
  WASD: walk &middot; Space/Shift: up/down &middot; Scroll: zoom
</div>
<div id="spinner">
  Loading garage<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
</div>
<div id="progress" style="width: 0%"></div>
<div id="message"></div>
<div id="camid"></div>

<script>
// Adapted from antimatter15/splat (MIT License)
// https://github.com/antimatter15/splat

// Wider FOV for easier navigation (~75 degree horizontal FOV)
// tan(75/2) = 0.767, so fx = (width/2) / tan(fov/2) = 960/0.767 = 1250
let cameras = [{
    id: 0, img_name: "DSC03417", width: 1920, height: 1080,
    position: [-3.474, 0.428, -1.449],
    rotation: [[1,0,0],[0,1,0],[0,0,1]],
    fy: 1250, fx: 1250,
}];
let camera = cameras[0];

function getProjectionMatrix(fx, fy, width, height) {
    const znear = 0.2, zfar = 200;
    return [
        (2*fx)/width, 0, 0, 0,
        0, -(2*fy)/height, 0, 0,
        0, 0, zfar/(zfar-znear), 1,
        0, 0, -(zfar*znear)/(zfar-znear), 0
    ];
}

function multiply4(a, b) {
    return [
        b[0]*a[0]+b[1]*a[4]+b[2]*a[8]+b[3]*a[12], b[0]*a[1]+b[1]*a[5]+b[2]*a[9]+b[3]*a[13],
        b[0]*a[2]+b[1]*a[6]+b[2]*a[10]+b[3]*a[14], b[0]*a[3]+b[1]*a[7]+b[2]*a[11]+b[3]*a[15],
        b[4]*a[0]+b[5]*a[4]+b[6]*a[8]+b[7]*a[12], b[4]*a[1]+b[5]*a[5]+b[6]*a[9]+b[7]*a[13],
        b[4]*a[2]+b[5]*a[6]+b[6]*a[10]+b[7]*a[14], b[4]*a[3]+b[5]*a[7]+b[6]*a[11]+b[7]*a[15],
        b[8]*a[0]+b[9]*a[4]+b[10]*a[8]+b[11]*a[12], b[8]*a[1]+b[9]*a[5]+b[10]*a[9]+b[11]*a[13],
        b[8]*a[2]+b[9]*a[6]+b[10]*a[10]+b[11]*a[14], b[8]*a[3]+b[9]*a[7]+b[10]*a[11]+b[11]*a[15],
        b[12]*a[0]+b[13]*a[4]+b[14]*a[8]+b[15]*a[12], b[12]*a[1]+b[13]*a[5]+b[14]*a[9]+b[15]*a[13],
        b[12]*a[2]+b[13]*a[6]+b[14]*a[10]+b[15]*a[14], b[12]*a[3]+b[13]*a[7]+b[14]*a[11]+b[15]*a[15]
    ];
}

function invert4(a) {
    let b00=a[0]*a[5]-a[1]*a[4], b01=a[0]*a[6]-a[2]*a[4], b02=a[0]*a[7]-a[3]*a[4];
    let b03=a[1]*a[6]-a[2]*a[5], b04=a[1]*a[7]-a[3]*a[5], b05=a[2]*a[7]-a[3]*a[6];
    let b06=a[8]*a[13]-a[9]*a[12], b07=a[8]*a[14]-a[10]*a[12], b08=a[8]*a[15]-a[11]*a[12];
    let b09=a[9]*a[14]-a[10]*a[13], b10=a[9]*a[15]-a[11]*a[13], b11=a[10]*a[15]-a[11]*a[14];
    let det=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06;
    if(!det) return null;
    return [
        (a[5]*b11-a[6]*b10+a[7]*b09)/det, (a[2]*b10-a[1]*b11-a[3]*b09)/det,
        (a[13]*b05-a[14]*b04+a[15]*b03)/det, (a[10]*b04-a[9]*b05-a[11]*b03)/det,
        (a[6]*b08-a[4]*b11-a[7]*b07)/det, (a[0]*b11-a[2]*b08+a[3]*b07)/det,
        (a[14]*b02-a[12]*b05-a[15]*b01)/det, (a[8]*b05-a[10]*b02+a[11]*b01)/det,
        (a[4]*b10-a[5]*b08+a[7]*b06)/det, (a[1]*b08-a[0]*b10-a[3]*b06)/det,
        (a[12]*b04-a[13]*b02+a[15]*b00)/det, (a[9]*b02-a[8]*b04-a[11]*b00)/det,
        (a[5]*b07-a[4]*b09-a[6]*b06)/det, (a[0]*b09-a[1]*b07+a[2]*b06)/det,
        (a[13]*b01-a[12]*b03-a[14]*b00)/det, (a[8]*b03-a[9]*b01+a[10]*b00)/det
    ];
}

function rotate4(a, rad, x, y, z) {
    let len=Math.hypot(x,y,z); x/=len; y/=len; z/=len;
    let s=Math.sin(rad), c=Math.cos(rad), t=1-c;
    let b00=x*x*t+c, b01=y*x*t+z*s, b02=z*x*t-y*s;
    let b10=x*y*t-z*s, b11=y*y*t+c, b12=z*y*t+x*s;
    let b20=x*z*t+y*s, b21=y*z*t-x*s, b22=z*z*t+c;
    return [
        a[0]*b00+a[4]*b01+a[8]*b02, a[1]*b00+a[5]*b01+a[9]*b02,
        a[2]*b00+a[6]*b01+a[10]*b02, a[3]*b00+a[7]*b01+a[11]*b02,
        a[0]*b10+a[4]*b11+a[8]*b12, a[1]*b10+a[5]*b11+a[9]*b12,
        a[2]*b10+a[6]*b11+a[10]*b12, a[3]*b10+a[7]*b11+a[11]*b12,
        a[0]*b20+a[4]*b21+a[8]*b22, a[1]*b20+a[5]*b21+a[9]*b22,
        a[2]*b20+a[6]*b21+a[10]*b22, a[3]*b20+a[7]*b21+a[11]*b22,
        ...a.slice(12,16)
    ];
}

function translate4(a, x, y, z) {
    return [...a.slice(0,12),
        a[0]*x+a[4]*y+a[8]*z+a[12], a[1]*x+a[5]*y+a[9]*z+a[13],
        a[2]*x+a[6]*y+a[10]*z+a[14], a[3]*x+a[7]*y+a[11]*z+a[15]
    ];
}

// Keep camera horizontal: remove roll and constrain pitch
function straightenCamera() {
    let inv = invert4(viewMatrix);
    let px = inv[12], py = inv[13], pz = inv[14];

    // Forward = negative of back row (row 2 of view matrix)
    let fx = -viewMatrix[2], fy = -viewMatrix[6], fz = -viewMatrix[10];

    // Decompose into yaw + pitch, clamp pitch to ±40°
    let fxz = Math.hypot(fx, fz);
    if (fxz < 0.001) fxz = 0.001;
    let pitch = Math.atan2(fy, fxz);
    pitch = Math.max(-0.7, Math.min(0.7, pitch));

    let fxn = fx / fxz, fzn = fz / fxz;
    let cp = Math.cos(pitch), sp = Math.sin(pitch);

    // Reconstructed forward with clamped pitch, no roll
    let nfx = fxn * cp, nfy = sp, nfz = fzn * cp;

    // World up rotated 20° around Z axis to correct scene tilt
    const TILT = 20 * Math.PI / 180;
    const wux = Math.sin(TILT), wuy = Math.cos(TILT), wuz = 0;
    // Right = cross(forward, worldUp)
    let nrx = nfy*wuz - nfz*wuy, nry = nfz*wux - nfx*wuz, nrz = nfx*wuy - nfy*wux;
    let nrl = Math.hypot(nrx, nry, nrz);
    nrx /= nrl; nry /= nrl; nrz /= nrl;

    // Up = cross(right, forward)
    let nux = nry * nfz - nrz * nfy;
    let nuy = nrz * nfx - nrx * nfz;
    let nuz = nrx * nfy - nry * nfx;
    let nul = Math.hypot(nux, nuy, nuz);
    nux /= nul; nuy /= nul; nuz /= nul;

    // Back = -forward
    let nbx = -nfx, nby = -nfy, nbz = -nfz;

    // Rebuild view matrix (column-major)
    let tx = -(nrx*px + nry*py + nrz*pz);
    let ty = -(nux*px + nuy*py + nuz*pz);
    let tz = -(nbx*px + nby*py + nbz*pz);

    viewMatrix = [
        nrx, nux, nbx, 0,
        nry, nuy, nby, 0,
        nrz, nuz, nbz, 0,
        tx,  ty,  tz,  1
    ];
}

function createWorker(self) {
    let buffer;
    let vertexCount = 0;
    let viewProj;
    const rowLength = 3*4 + 3*4 + 4 + 4;
    let lastProj = [];
    let depthIndex = new Uint32Array();
    let lastVertexCount = 0;

    var _floatView = new Float32Array(1);
    var _int32View = new Int32Array(_floatView.buffer);

    function floatToHalf(float) {
        _floatView[0] = float;
        var f = _int32View[0];
        var sign = (f >> 31) & 0x0001;
        var exp = (f >> 23) & 0x00ff;
        var frac = f & 0x007fffff;
        var newExp;
        if (exp == 0) { newExp = 0; }
        else if (exp < 113) { newExp = 0; frac |= 0x00800000; frac = frac >> (113 - exp); if (frac & 0x01000000) { newExp = 1; frac = 0; } }
        else if (exp < 142) { newExp = exp - 112; }
        else { newExp = 31; frac = 0; }
        return (sign << 15) | (newExp << 10) | (frac >> 13);
    }

    function packHalf2x16(x, y) { return (floatToHalf(x) | (floatToHalf(y) << 16)) >>> 0; }

    function generateTexture() {
        if (!buffer) return;
        const f_buffer = new Float32Array(buffer);
        const u_buffer = new Uint8Array(buffer);
        var texwidth = 1024 * 2;
        var texheight = Math.ceil((2 * vertexCount) / texwidth);
        var texdata = new Uint32Array(texwidth * texheight * 4);
        var texdata_c = new Uint8Array(texdata.buffer);
        var texdata_f = new Float32Array(texdata.buffer);

        for (let i = 0; i < vertexCount; i++) {
            texdata_f[8*i+0] = f_buffer[8*i+0];
            texdata_f[8*i+1] = f_buffer[8*i+1];
            texdata_f[8*i+2] = f_buffer[8*i+2];
            texdata_c[4*(8*i+7)+0] = u_buffer[32*i+24+0];
            texdata_c[4*(8*i+7)+1] = u_buffer[32*i+24+1];
            texdata_c[4*(8*i+7)+2] = u_buffer[32*i+24+2];
            texdata_c[4*(8*i+7)+3] = u_buffer[32*i+24+3];

            let scale = [f_buffer[8*i+3], f_buffer[8*i+4], f_buffer[8*i+5]];
            let rot = [
                (u_buffer[32*i+28+0]-128)/128, (u_buffer[32*i+28+1]-128)/128,
                (u_buffer[32*i+28+2]-128)/128, (u_buffer[32*i+28+3]-128)/128
            ];
            const M = [
                1.0-2.0*(rot[2]*rot[2]+rot[3]*rot[3]), 2.0*(rot[1]*rot[2]+rot[0]*rot[3]), 2.0*(rot[1]*rot[3]-rot[0]*rot[2]),
                2.0*(rot[1]*rot[2]-rot[0]*rot[3]), 1.0-2.0*(rot[1]*rot[1]+rot[3]*rot[3]), 2.0*(rot[2]*rot[3]+rot[0]*rot[1]),
                2.0*(rot[1]*rot[3]+rot[0]*rot[2]), 2.0*(rot[2]*rot[3]-rot[0]*rot[1]), 1.0-2.0*(rot[1]*rot[1]+rot[2]*rot[2])
            ].map((k, i) => k * scale[Math.floor(i / 3)]);
            const sigma = [
                M[0]*M[0]+M[3]*M[3]+M[6]*M[6], M[0]*M[1]+M[3]*M[4]+M[6]*M[7],
                M[0]*M[2]+M[3]*M[5]+M[6]*M[8], M[1]*M[1]+M[4]*M[4]+M[7]*M[7],
                M[1]*M[2]+M[4]*M[5]+M[7]*M[8], M[2]*M[2]+M[5]*M[5]+M[8]*M[8]
            ];
            texdata[8*i+4] = packHalf2x16(4*sigma[0], 4*sigma[1]);
            texdata[8*i+5] = packHalf2x16(4*sigma[2], 4*sigma[3]);
            texdata[8*i+6] = packHalf2x16(4*sigma[4], 4*sigma[5]);
        }
        self.postMessage({ texdata, texwidth, texheight }, [texdata.buffer]);
    }

    function runSort(viewProj) {
        if (!buffer) return;
        const f_buffer = new Float32Array(buffer);
        if (lastVertexCount == vertexCount) {
            let dot = lastProj[2]*viewProj[2] + lastProj[6]*viewProj[6] + lastProj[10]*viewProj[10];
            if (Math.abs(dot - 1) < 0.01) return;
        } else {
            generateTexture();
            lastVertexCount = vertexCount;
        }
        let maxDepth = -Infinity, minDepth = Infinity;
        let sizeList = new Int32Array(vertexCount);
        for (let i = 0; i < vertexCount; i++) {
            let depth = ((viewProj[2]*f_buffer[8*i] + viewProj[6]*f_buffer[8*i+1] + viewProj[10]*f_buffer[8*i+2])*4096)|0;
            sizeList[i] = depth;
            if (depth > maxDepth) maxDepth = depth;
            if (depth < minDepth) minDepth = depth;
        }
        let depthInv = (256*256-1) / (maxDepth - minDepth);
        let counts0 = new Uint32Array(256*256);
        for (let i = 0; i < vertexCount; i++) { sizeList[i] = ((sizeList[i]-minDepth)*depthInv)|0; counts0[sizeList[i]]++; }
        let starts0 = new Uint32Array(256*256);
        for (let i = 1; i < 256*256; i++) starts0[i] = starts0[i-1] + counts0[i-1];
        depthIndex = new Uint32Array(vertexCount);
        for (let i = 0; i < vertexCount; i++) depthIndex[starts0[sizeList[i]]++] = i;
        lastProj = viewProj;
        self.postMessage({ depthIndex, viewProj, vertexCount }, [depthIndex.buffer]);
    }

    let sortRunning;
    const throttledSort = () => {
        if (!sortRunning) {
            sortRunning = true;
            let lastView = viewProj;
            runSort(lastView);
            setTimeout(() => { sortRunning = false; if (lastView !== viewProj) throttledSort(); }, 0);
        }
    };

    self.onmessage = (e) => {
        if (e.data.buffer) {
            buffer = e.data.buffer;
            vertexCount = e.data.vertexCount;
            generateTexture();
        } else if (e.data.vertexCount) {
            vertexCount = e.data.vertexCount;
        } else if (e.data.view) {
            viewProj = e.data.view;
            throttledSort();
        }
    };
}

const vertexShaderSource = `#version 300 es
precision highp float;
precision highp int;
uniform highp usampler2D u_texture;
uniform mat4 projection, view;
uniform vec2 focal;
uniform vec2 viewport;
in vec2 position;
in int index;
out vec4 vColor;
out vec2 vPosition;
void main () {
    uvec4 cen = texelFetch(u_texture, ivec2((uint(index) & 0x3ffu) << 1, uint(index) >> 10), 0);
    vec4 cam = view * vec4(uintBitsToFloat(cen.xyz), 1);
    vec4 pos2d = projection * cam;
    float clip = 1.2 * pos2d.w;
    if (pos2d.z < -clip || pos2d.x < -clip || pos2d.x > clip || pos2d.y < -clip || pos2d.y > clip) {
        gl_Position = vec4(0.0, 0.0, 2.0, 1.0); return;
    }
    uvec4 cov = texelFetch(u_texture, ivec2(((uint(index) & 0x3ffu) << 1) | 1u, uint(index) >> 10), 0);
    vec2 u1 = unpackHalf2x16(cov.x), u2 = unpackHalf2x16(cov.y), u3 = unpackHalf2x16(cov.z);
    mat3 Vrk = mat3(u1.x, u1.y, u2.x, u1.y, u2.y, u3.x, u2.x, u3.x, u3.y);
    mat3 J = mat3(
        focal.x / cam.z, 0., -(focal.x * cam.x) / (cam.z * cam.z),
        0., -focal.y / cam.z, (focal.y * cam.y) / (cam.z * cam.z),
        0., 0., 0.
    );
    mat3 T = transpose(mat3(view)) * J;
    mat3 cov2d = transpose(T) * Vrk * T;
    float mid = (cov2d[0][0] + cov2d[1][1]) / 2.0;
    float radius = length(vec2((cov2d[0][0] - cov2d[1][1]) / 2.0, cov2d[0][1]));
    float lambda1 = mid + radius, lambda2 = mid - radius;
    if(lambda2 < 0.0) return;
    vec2 diagonalVector = normalize(vec2(cov2d[0][1], lambda1 - cov2d[0][0]));
    vec2 majorAxis = min(sqrt(2.0 * lambda1), 1024.0) * diagonalVector;
    vec2 minorAxis = min(sqrt(2.0 * lambda2), 1024.0) * vec2(diagonalVector.y, -diagonalVector.x);
    vColor = clamp(pos2d.z/pos2d.w+1.0, 0.0, 1.0) * vec4((cov.w) & 0xffu, (cov.w >> 8) & 0xffu, (cov.w >> 16) & 0xffu, (cov.w >> 24) & 0xffu) / 255.0;
    vPosition = position;
    vec2 vCenter = vec2(pos2d) / pos2d.w;
    gl_Position = vec4(vCenter + position.x * majorAxis / viewport + position.y * minorAxis / viewport, 0.0, 1.0);
}`;

const fragmentShaderSource = `#version 300 es
precision highp float;
in vec4 vColor;
in vec2 vPosition;
out vec4 fragColor;
void main () {
    float A = -dot(vPosition, vPosition);
    if (A < -4.0) discard;
    float B = exp(A) * vColor.a;
    fragColor = vec4(B * vColor.rgb, B);
}`;

// View matrix from COLMAP camera DSC03417 (wide shot of garage)
let defaultViewMatrix = [
    0.1943, -0.0326, 0.9804, 0.0, 0.4092, 0.9111, -0.0508, 0.0, -0.8915, 0.411, 0.1904, 0.0, -0.7918, 0.0923, 3.7035, 1.0
];
let viewMatrix = defaultViewMatrix;
straightenCamera();

async function main() {
    let carousel = false;
    try { viewMatrix = JSON.parse(decodeURIComponent(location.hash.slice(1))); straightenCamera(); } catch(e) {}

    const splatUrl = "garage.splat";
    const req = await fetch(splatUrl);
    if (req.status != 200) throw new Error(req.status + " Unable to load " + splatUrl);

    const rowLength = 3*4 + 3*4 + 4 + 4;
    const contentLength = parseInt(req.headers.get("content-length")) || 0;
    let splatData = new Uint8Array(contentLength || 1024*1024);

    const downsample = (contentLength / rowLength > 500000) ? 1 : 1 / devicePixelRatio;

    const worker = new Worker(URL.createObjectURL(new Blob(["(", createWorker.toString(), ")(self)"], { type: "application/javascript" })));

    const canvas = document.getElementById("canvas");
    const fps = document.getElementById("fps");

    let projectionMatrix;
    const gl = canvas.getContext("webgl2", { antialias: false });
    if (!gl) { document.getElementById("message").innerText = "WebGL 2 not supported"; return; }

    const vertexShader = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vertexShader, vertexShaderSource);
    gl.compileShader(vertexShader);
    if (!gl.getShaderParameter(vertexShader, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(vertexShader));

    const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fragmentShader, fragmentShaderSource);
    gl.compileShader(fragmentShader);
    if (!gl.getShaderParameter(fragmentShader, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(fragmentShader));

    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    gl.useProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(program));

    gl.disable(gl.DEPTH_TEST);
    gl.enable(gl.BLEND);
    gl.blendFuncSeparate(gl.ONE_MINUS_DST_ALPHA, gl.ONE, gl.ONE_MINUS_DST_ALPHA, gl.ONE);
    gl.blendEquationSeparate(gl.FUNC_ADD, gl.FUNC_ADD);

    const u_projection = gl.getUniformLocation(program, "projection");
    const u_viewport = gl.getUniformLocation(program, "viewport");
    const u_focal = gl.getUniformLocation(program, "focal");
    const u_view = gl.getUniformLocation(program, "view");

    // Splat VAO
    const splatVAO = gl.createVertexArray();
    gl.bindVertexArray(splatVAO);

    const triangleVertices = new Float32Array([-2,-2, 2,-2, 2,2, -2,2]);
    const vertexBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, triangleVertices, gl.STATIC_DRAW);
    const a_position = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(a_position);
    gl.vertexAttribPointer(a_position, 2, gl.FLOAT, false, 0, 0);

    var texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.uniform1i(gl.getUniformLocation(program, "u_texture"), 0);

    const indexBuffer = gl.createBuffer();
    const a_index = gl.getAttribLocation(program, "index");
    gl.enableVertexAttribArray(a_index);
    gl.bindBuffer(gl.ARRAY_BUFFER, indexBuffer);
    gl.vertexAttribIPointer(a_index, 1, gl.INT, false, 0, 0);
    gl.vertexAttribDivisor(a_index, 1);

    gl.bindVertexArray(null);

    const resize = () => {
        gl.useProgram(program);
        gl.uniform2fv(u_focal, new Float32Array([camera.fx, camera.fy]));
        projectionMatrix = getProjectionMatrix(camera.fx, camera.fy, innerWidth, innerHeight);
        gl.uniform2fv(u_viewport, new Float32Array([innerWidth, innerHeight]));
        gl.canvas.width = Math.round(innerWidth / downsample);
        gl.canvas.height = Math.round(innerHeight / downsample);
        gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
        gl.uniformMatrix4fv(u_projection, false, projectionMatrix);
    };
    window.addEventListener("resize", resize);
    resize();

    let vertexCount = 0;
    worker.onmessage = (e) => {
        if (e.data.texdata) {
            const { texdata, texwidth, texheight } = e.data;
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32UI, texwidth, texheight, 0, gl.RGBA_INTEGER, gl.UNSIGNED_INT, texdata);
            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, texture);
        } else if (e.data.depthIndex) {
            gl.bindBuffer(gl.ARRAY_BUFFER, indexBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, e.data.depthIndex, gl.DYNAMIC_DRAW);
            vertexCount = e.data.vertexCount;
        }
    };

    // Controls
    let activeKeys = [];
    window.addEventListener("keydown", (e) => { carousel = false; if (!activeKeys.includes(e.code)) activeKeys.push(e.code); });
    window.addEventListener("keyup", (e) => { activeKeys = activeKeys.filter(k => k !== e.code); });
    window.addEventListener("blur", () => { activeKeys = []; });

    // ===== CONTROLS =====
    // Left drag = look around (FPS style, rotate in place)
    // Right drag = pan/strafe (move sideways + up/down)
    // Scroll = move forward/back
    // Middle drag = orbit around a point ahead

    window.addEventListener("wheel", (e) => {
        e.preventDefault();
        const scale = e.deltaMode == 1 ? 10 : e.deltaMode == 2 ? innerHeight : 1;
        let inv = invert4(viewMatrix);
        // Scroll = dolly forward/back
        inv = translate4(inv, 0, 0, (-8*(e.deltaY*scale))/innerHeight);
        viewMatrix = invert4(inv);
    }, { passive: false });

    let startX, startY, down;
    canvas.addEventListener("mousedown", (e) => {
        e.preventDefault(); startX=e.clientX; startY=e.clientY;
        if (e.button === 1 || (e.button === 0 && (e.ctrlKey || e.metaKey))) down = 3; // middle or ctrl+left = orbit
        else if (e.button === 2 || e.button === 0 && e.shiftKey) down = 2; // right or shift+left = pan
        else down = 1; // left = look
    });
    canvas.addEventListener("contextmenu", (e) => { e.preventDefault(); startX=e.clientX; startY=e.clientY; down=2; });
    canvas.addEventListener("mousemove", (e) => {
        e.preventDefault();
        if (down==1) {
            // Left drag = look around (rotate camera in place, like FPS)
            let inv=invert4(viewMatrix);
            let dx = (2.5*(e.clientX-startX))/innerWidth;
            let dy = (2.5*(e.clientY-startY))/innerHeight;
            inv = rotate4(inv, -dx, 0, 1, 0);
            inv = rotate4(inv, dy, 1, 0, 0);
            viewMatrix=invert4(inv); startX=e.clientX; startY=e.clientY;
        } else if (down==2) {
            // Right drag = strafe/pan
            let inv=invert4(viewMatrix);
            let dx = (-4*(e.clientX-startX))/innerWidth;
            let dy = (4*(e.clientY-startY))/innerHeight;
            inv = translate4(inv, dx, dy, 0);
            viewMatrix=invert4(inv); startX=e.clientX; startY=e.clientY;
        } else if (down==3) {
            // Middle/ctrl drag = orbit around point ahead
            let inv=invert4(viewMatrix), dx=(3*(e.clientX-startX))/innerWidth, dy=(3*(e.clientY-startY))/innerHeight, d=3;
            inv=translate4(inv,0,0,d); inv=rotate4(inv,dx,0,1,0); inv=rotate4(inv,-dy,1,0,0); inv=translate4(inv,0,0,-d);
            viewMatrix=invert4(inv); startX=e.clientX; startY=e.clientY;
        }
    });
    canvas.addEventListener("mouseup", (e) => { e.preventDefault(); down=false; });

    // Touch controls
    let altX=0, altY=0;
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if(e.touches.length===1) { startX=e.touches[0].clientX; startY=e.touches[0].clientY; down=1; }
        else if(e.touches.length===2) { startX=e.touches[0].clientX; altX=e.touches[1].clientX; startY=e.touches[0].clientY; altY=e.touches[1].clientY; down=2; }
    }, {passive:false});
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        if(e.touches.length===1 && down) {
            // One finger = look around
            let inv=invert4(viewMatrix);
            let dx=(2.5*(e.touches[0].clientX-startX))/innerWidth;
            let dy=(2.5*(e.touches[0].clientY-startY))/innerHeight;
            inv=rotate4(inv, -dx, 0, 1, 0);
            inv=rotate4(inv, dy, 1, 0, 0);
            viewMatrix=invert4(inv); startX=e.touches[0].clientX; startY=e.touches[0].clientY;
        } else if(e.touches.length===2) {
            // Two fingers = pinch to zoom + drag to pan
            const dscale=Math.hypot(startX-altX,startY-altY)/Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
            const dx=(e.touches[0].clientX+e.touches[1].clientX-(startX+altX))/2;
            const dy=(e.touches[0].clientY+e.touches[1].clientY-(startY+altY))/2;
            let inv=invert4(viewMatrix);
            inv=translate4(inv, -2*dx/innerWidth, 2*dy/innerHeight, 0);
            inv=translate4(inv, 0, 0, 4*(1-dscale));
            viewMatrix=invert4(inv);
            startX=e.touches[0].clientX; altX=e.touches[1].clientX; startY=e.touches[0].clientY; altY=e.touches[1].clientY;
        }
    }, {passive:false});
    canvas.addEventListener("touchend", (e) => { e.preventDefault(); down=false; }, {passive:false});

    // Render loop
    let lastFrame=0, avgFps=0, start=Date.now();

    const frame = (now) => {
        let inv = invert4(viewMatrix);
        let shiftKey = activeKeys.includes("ShiftLeft") || activeKeys.includes("ShiftRight");
        let moveSpeed = 0.08;
        let rotSpeed = 0.02;
        if (activeKeys.includes("ArrowUp")) inv = translate4(inv, 0, 0, moveSpeed);
        if (activeKeys.includes("ArrowDown")) inv = translate4(inv, 0, 0, -moveSpeed);
        if (activeKeys.includes("ArrowLeft")) inv = rotate4(inv, -rotSpeed, 0, 1, 0);
        if (activeKeys.includes("ArrowRight")) inv = rotate4(inv, rotSpeed, 0, 1, 0);
        if (activeKeys.includes("KeyW")) inv = translate4(inv, 0, 0, moveSpeed);
        if (activeKeys.includes("KeyS")) inv = translate4(inv, 0, 0, -moveSpeed);
        if (activeKeys.includes("KeyA")) inv = translate4(inv, -moveSpeed, 0, 0);
        if (activeKeys.includes("KeyD")) inv = translate4(inv, moveSpeed, 0, 0);
        if (activeKeys.includes("Space")) inv = translate4(inv, 0, -moveSpeed, 0);
        if (shiftKey) inv = translate4(inv, 0, moveSpeed, 0);
        viewMatrix = invert4(inv);

        // Keep camera level every frame
        straightenCamera();

        const viewProj = multiply4(projectionMatrix, viewMatrix);
        worker.postMessage({ view: viewProj });

        const currentFps = 1000 / (now - lastFrame) || 0;
        avgFps = avgFps * 0.9 + currentFps * 0.1;

        if (vertexCount > 0) {
            document.getElementById("spinner").style.display = "none";
            gl.bindVertexArray(splatVAO);
            gl.uniformMatrix4fv(u_view, false, viewMatrix);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArraysInstanced(gl.TRIANGLE_FAN, 0, 4, vertexCount);
        } else {
            document.getElementById("spinner").style.display = "";
            start = Date.now() + 2000;
        }

        const progress = (100 * vertexCount) / (splatData.length / rowLength);
        if (progress < 100) document.getElementById("progress").style.width = progress + "%";
        else document.getElementById("progress").style.display = "none";

        fps.innerText = Math.round(avgFps) + " fps";
        lastFrame = now;
        requestAnimationFrame(frame);
    };
    frame();

    // Stream load
    const reader = req.body.getReader();
    let bytesRead = 0;
    let lastVertexCount = -1;
    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        if (bytesRead + value.length > splatData.length) {
            const newData = new Uint8Array(Math.max(splatData.length * 2, bytesRead + value.length));
            newData.set(splatData);
            splatData = newData;
        }
        splatData.set(value, bytesRead);
        bytesRead += value.length;
        if (vertexCount > lastVertexCount) {
            worker.postMessage({ buffer: splatData.buffer, vertexCount: Math.floor(bytesRead / rowLength) });
            lastVertexCount = vertexCount;
        }
    }
    worker.postMessage({ buffer: splatData.buffer, vertexCount: Math.floor(bytesRead / rowLength) });
}

main().catch(err => {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("message").innerText = err.toString();
});
</script>
</body>
</html>
